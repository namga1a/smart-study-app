<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Study App</title>
    <link rel="icon" type="image/png" href="/assets/logo_square.jpg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <img src="/assets/logo_square.jpg" alt="Logo" class="logo" />
        <h1>Smart Study App</h1>
      </div>

      <nav>
        <a href="index.html">Home</a>
        <a href="planner.html">Planner</a>
        <a href="notes.html">Notes</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Welcome 👋</h2>
        <p>This app helps you study smarter using AI + planning tools.</p>
      </section>
    </main>

    <section>
      <h2>Search Study Topics</h2>

      <form id="search-form">
        <input
          type="text"
          id="search-input"
          placeholder="Search a topic..."
          required
        />

        <button type="submit">Search</button>
      </form>

      <p id="loading"></p>

      <div id="results"></div>
    </section>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
