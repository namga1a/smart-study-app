<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <script src="/js/theme.js" defer></script>
    <script type="module" src="/js/main.js" defer></script>
    <link rel="icon" type="image/png" href="/assets/logo_square.jpg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <img src="/assets/logo_square.jpg" alt="Logo" class="logo" />
        <h1>Smart Study App</h1>
      </div>

      <nav>
        <button
          class="theme-switch"
          id="theme-toggle"
          aria-label="Toggle Theme"
        >
          <span class="icon">🌙</span>
        </button>
        <a href="index.html">Home</a>
        <a href="planner.html">Planner</a>
        <a href="notes.html" style="color: var(--primary); font-weight: 700"
          >Notes</a
        >
        <a href="subjects.html">Subjects</a>
      </nav>
    </header>

    <main>
      <h2>Notes Page</h2>

      <form id="notes-form">
        <input type="text" id="note-title" placeholder="Note title" required />

        <textarea
          id="notes-input"
          placeholder="Write your note..."
          required
        ></textarea>

        <button type="submit">Save Note</button>
      </form>

      <div id="notes-list"></div>
    </main>

  </body>
</html>
